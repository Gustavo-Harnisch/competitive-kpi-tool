name: Sync GitHub Project

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Optional maximum number of issues to process
        required: false
        type: string
  push:
    paths:
      - automation-package/planning/project.json
      - automation-package/scripts/sync_project.py
      - automation-package/setup_project.sh
      - automation-package/.github/workflows/sync-project.yml

permissions:
  contents: read

concurrency:
  group: competitive-kpi-project-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate configuration
        working-directory: automation-package
        run: ./setup_project.sh --dry-run --limit 5

      - name: Synchronize project
        working-directory: automation-package
        shell: bash
        run: |
          args=()
          if [[ -n "${{ inputs.limit }}" ]]; then
            args+=(--limit "${{ inputs.limit }}")
          fi
          ./setup_project.sh "${args[@]}"
